# Local dev overrides for `wrangler dev`. This file is committed — it only
# declares a local D1 binding so `wrangler dev` creates an embedded SQLite.
# Production wrangler.toml omits the D1 block so the Worker is agnostic to
# database_id; the real D1 binding is set in the Cloudflare dashboard.

name = "zyes-dev"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"

# Local-only D1 — wrangler dev uses an embedded SQLite, no `npx wrangler d1
# create` needed. `npx wrangler d1 migrations apply DB --local` runs against
# this same local database so you can test schema changes before deploying.
[[d1_databases]]
binding = "DB"
database_name = "zyes-local"
database_id = "local-dev"
migrations_dir = "migrations"

[observability]
enabled = true
