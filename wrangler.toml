name = "zyes"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Frontend static assets served by the Worker (vite build output -> dist/client).
# On Cloudflare, prefer Workers Assets; this [assets] block maps the built client
# to the Worker's static path so non-/api routes return the SPA.
[assets]
directory = "./dist/client"
binding = "ASSETS"

# The single D1 database backing all bookmark/category/settings data.
# `database_id` MUST hold a placeholder value the Deploy-to-Cloudflare button can
# rewrite; it auto-provisions the DB and overwrites this id. For local dev the
# id is ignored (wrangler dev --local uses an embedded SQLite).
[[d1_databases]]
binding = "DB"
database_name = "zyes-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"


# Secrets (set via `wrangler secret put`): JWT_SECRET.
# Password hash lives in the D1 `meta` table, not here, so it can be rotated
# without redeploying.
[observability]
enabled = true
