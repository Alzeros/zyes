name = "zyes"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Frontend static assets served by the Worker (vite build output -> dist/client).
# On Cloudflare, prefer Workers Assets; this [assets] block maps the built client
# to the Worker's static path so non-/api routes return the SPA.
[assets]
directory = "./dist/client"
binding = "ASSETS"

# D1 database binding. `database_id` is intentionally omitted — on the first
# `wrangler deploy` with wrangler 4.x+, Cloudflare auto-provisions a D1 named
# `zyes-db` (prefixed with the Worker name) and tracks the generated id
# internally via the inherit-symbol mechanism. This means:
#   - You do NOT need to edit this file with your personal database_id
#   - Forkers can deploy without creating their D1 first
#   - The binding survives across future deploys (unlike dashboard-only binds,
#     which `wrangler deploy` overwrites because wrangler.toml is source-of-truth)
# Requires wrangler 4.x (auto-provisioning GA, 2025-10).
[[d1_databases]]
binding = "DB"
database_name = "zyes-db"
migrations_dir = "migrations"

# Worker variables (set as Text type in the dashboard / deploy button form):
#   JWT_SECRET    — random string (>= 32 bytes) to sign JWTs. MUST be changed,
#                   never use the placeholder from .dev.vars.example.
#   ZYES_PASSWORD — the login password users enter on the login screen.
# Both are read as `c.env.*` in worker/src; plain-text type so they stay
# viewable/editable in the dashboard.
[observability]
enabled = true
