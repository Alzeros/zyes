name = "zyes"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Frontend static assets served by the Worker (vite build output -> dist/client).
# On Cloudflare, prefer Workers Assets; this [assets] block maps the built client
# to the Worker's static path so non-/api routes return the SPA.
[assets]
directory = "./dist/client"
binding = "ASSETS"

# D1 binding: NOT declared here — instead bind manually in the Cloudflare
# dashboard (Workers & Pages → Settings → Bindings → D1, name "DB").
# This keeps `wrangler deploy` agnostic to your personal database_id so both
# fork deployment and the Deploy-to-Cloudflare button work without editing
# this file.
#
# Worker variables (set as Text type in the dashboard / deploy button form):
#   JWT_SECRET    — random string (>= 32 bytes) to sign JWTs. MUST be changed,
#                   never use the placeholder from .dev.vars.example.
#   ZYES_PASSWORD — the login password users enter on the login screen.
# Both are read as `c.env.*` in worker/src; plain-text type so they stay
# viewable/editable in the dashboard.
[observability]
enabled = true
